<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Geer Express</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --cream: #f5f0e8;
      --dark: #0d0b08;
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background: var(--dark);
      color: var(--cream);
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/images/hero.jpg');
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      animation: slowZoom 20s ease-out forwards;
    }

    /* Fallback gradient si pas encore d'image */
    .hero-bg-fallback {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        #1a1208 0%,
        #2c1f0a 30%,
        #1a2a1a 70%,
        #0d0b08 100%
      );
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 8, 4, 0.35) 0%,
        rgba(10, 8, 4, 0.15) 40%,
        rgba(10, 8, 4, 0.6) 100%
      );
    }

    @keyframes slowZoom {
      from { transform: scale(1.05); }
      to   { transform: scale(1.0); }
    }

    /* ── NAVBAR ── */
    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 3rem;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--cream);
      opacity: 0;
      animation: fadeDown 0.8s ease 0.2s forwards;
    }

    .nav-logo svg {
      width: 36px;
      height: 36px;
      fill: var(--cream);
    }

    .nav-logo span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0;
      list-style: none;
      opacity: 0;
      animation: fadeDown 0.8s ease 0.4s forwards;
    }

    .nav-links li {
      display: flex;
      align-items: center;
    }

    .nav-links li:not(:last-child)::after {
      content: '/';
      color: rgba(245, 240, 232, 0.4);
      margin: 0 0.6rem;
      font-weight: 300;
    }

    .nav-links a {
      color: var(--cream);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: color 0.25s ease;
      white-space: nowrap;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-links .nav-more {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
    }

    .nav-links .nav-more svg {
      width: 12px;
      height: 12px;
      fill: var(--cream);
      transition: fill 0.25s ease;
    }

    .nav-links .nav-more:hover svg {
      fill: var(--gold);
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 2rem;
      gap: 1.25rem;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: var(--cream);
      opacity: 0;
      animation: fadeUp 0.9s ease 0.8s forwards;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(245, 240, 232, 0.75);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 0.9s ease 1s forwards;
    }

    .hero-divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      opacity: 0;
      animation: fadeUp 0.9s ease 1.1s forwards;
    }

    /* ── SCROLL INDICATOR ── */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.4s forwards;
    }

    .scroll-hint span {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(245, 240, 232, 0.5);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.1); }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav {
        padding: 1.5rem 1.5rem;
      }

      .nav-links {
        display: none; /* à remplacer par un burger menu plus tard */
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg-fallback"></div>
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- NAVBAR -->
    <nav>
      <a class="nav-logo" href="#">
        <!-- Icône cerf SVG minimaliste -->
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 54 C32 54 20 44 20 34 C20 26 26 20 32 20 C38 20 44 26 44 34 C44 44 32 54 32 54Z"/>
          <path d="M26 20 C24 16 20 14 16 10 M26 20 C22 18 18 16 14 18 M38 20 C40 16 44 14 48 10 M38 20 C42 18 46 16 50 18"/>
          <circle cx="32" cy="30" r="2"/>
        </svg>
        <span>Staff Scouts</span>
      </a>

      <ul class="nav-links">
        <li><a href="#accueil">Accueil</a></li>
        <li><a href="#patrouilles">Les patrouilles</a></li>
        <li><a href="#infos">Infos pratiques</a></li>
        <li><a href="#activites">Activités &amp; Récompenses</a></li>
        <li><a href="#promesse">Promesse, Quali &amp; Totem</a></li>
        <li>
          <a href="#" class="nav-more">
            Plus
            <svg viewBox="0 0 10 6" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
          </a>
        </li>
      </ul>
    </nav>

    <!-- CONTENU HERO -->
    <div class="hero-content">
      <p class="hero-eyebrow">Juillet 2026</p>
      <h1 class="hero-title">Highland games</h1>
      <div class="hero-divider"></div>
      <p class="hero-subtitle">Prouvez votre courage</p>
    </div>

    <!-- SCROLL -->
    <div class="scroll-hint">
      <span>Découvrir</span>
      <div class="scroll-line"></div>
    </div>
  </section>

</body>
</html>
